<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文Hacker News - 月之暗面AI翻译</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .news-item {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        .news-item:hover {
            background-color: #f8f9fa;
            border-left: 4px solid #0d6efd;
        }
        .original-title {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .score-badge {
            min-width: 40px;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <header class="text-center mb-5">
            <h1 class="display-4">中文Hacker News</h1>
            <p class="lead">AI实时翻译 · 由月之暗面提供技术支持</p>
            <div class="d-flex justify-content-center align-items-center">
                <div class="spinner-border text-primary me-2" role="status" id="loading-spinner">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <small class="text-muted" id="last-updated">最后更新: <span id="update-time">刚刚</span></small>
            </div>
        </header>
        
        <div class="list-group" id="news-list">
            {% for item in news_items %}
            <a href="{{ item.original_url }}" target="_blank" class="list-group-item list-group-item-action news-item py-3">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1">{{ item.translated_title }}</h5>
                    <span class="badge bg-primary rounded-pill score-badge">{{ item.score }}分</span>
                </div>
                <p class="mb-1 original-title mt-2">{{ item.original_title }}</p>
            </a>
            {% else %}
            <div class="alert alert-info text-center">
                <p>正在获取最新新闻，请稍候...</p>
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <footer class="mt-5 text-center text-muted">
            <p>数据来源: Hacker News API | 翻译引擎: 月之暗面AI</p>
            <p>自动更新每5分钟一次</p>
        </footer>
    </div>

    <script>
        // 自动刷新页面
        function updateLastUpdated() {
            const now = new Date();
            document.getElementById('update-time').textContent = 
                `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        }
        
        // 初始更新
        updateLastUpdated();
        
        // 每5分钟刷新页面
        setInterval(() => {
            window.location.reload();
        }, 300000);
        
        // 每分钟更新一次时间显示
        setInterval(updateLastUpdated, 60000);
    </script>
</body>
</html>
